<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12233b">
<title>YS Brisbane — Demo</title>
<style>
/* ── CAMP-APP VISUAL LANGUAGE ── */
:root{
  --navy:#12233b;--blue:#2563eb;--blue2:#3b82f6;--teal:#0ea5a4;
  --amber:#f59e0b;--rose:#e11d48;--green:#16a34a;
  --paper:#f4f7fc;--card:#fff;--ink:#1f2937;--muted:#647488;--line:#e8edf4;
  --chip:#eef4ff;--r:14px;--rs:11px;--f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --sb:env(safe-area-inset-bottom,0px);
  /* Aliases used by render functions */
  --a:var(--blue);--ad:#1d4ed8;--al:var(--chip);--d:var(--rose);--dl:#fde2e1;
  --w:var(--amber);--wl:#fef3c7;--s:var(--green);--sl:#e7f7ec;
  --bg:var(--paper);--bdr:var(--line);--im:var(--muted);--if:#94a3b8;
  --sh:0 3px 10px rgba(18,35,59,.05);--shm:0 4px 16px rgba(18,35,59,.1);
}
@keyframes rise{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
/* Layout is mobile-first (px spacing, rem text). Scale the text up on larger
   screens so it reads comfortably on a laptop/desktop without changing spacing. */
@media(min-width:768px){html{font-size:18px}}
@media(min-width:1280px){html{font-size:19px}}
body{font-family:var(--f);color:var(--ink);background:var(--paper);min-height:100vh}
button{cursor:pointer;border:none;background:none;font:inherit}
input,select,textarea{font:inherit}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,var(--navy),#1a3a6b);color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(18,35,59,.25)}
/* In phone mode the header must extend up behind the Dynamic Island */
body.phone-mode .hdr{padding-top:50px;height:calc(56px + 50px);align-items:flex-end;padding-bottom:8px}
.hdr h1{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hm{display:flex;align-items:center;gap:8px}
.rb{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:3px 10px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;cursor:help;position:relative}
.rb::after{content:attr(data-tip);position:absolute;top:calc(100%+6px);right:0;background:var(--navy);color:#fff;font-size:.7rem;padding:5px 10px;border-radius:8px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;font-weight:400;text-transform:none;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.rb:hover::after{opacity:1}
.dp{background:rgba(245,158,11,.25);border:1px solid rgba(245,158,11,.4);border-radius:999px;padding:2px 9px;font-size:.6rem;font-weight:800;color:#fef3c7;letter-spacing:.05em}
.bi{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);color:#fff;cursor:pointer;transition:background .15s}
.bi:hover{background:rgba(255,255,255,.22)}
.bi svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
@media(min-width:768px){.hdr{padding:0 28px;height:60px}.hdr h1{font-size:19px}}

/* ── DESKTOP NAV ── */
.dn{display:none}
@media(min-width:768px){.dn{display:flex;gap:2px}}
.dn a{padding:7px 14px;border-radius:999px;font-size:.8rem;font-weight:600;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.dn a svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dn a.on,.dn a:hover{background:rgba(255,255,255,.18);color:#fff}

/* ── BOTTOM NAV ── */
.bn{display:flex;background:var(--card);border-top:1px solid var(--line);padding:6px 0 calc(6px + var(--sb));position:sticky;bottom:0;z-index:100;box-shadow:0 -2px 8px rgba(18,35,59,.06)}
.bn a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:4px 2px;cursor:pointer;transition:color .15s;position:relative}
.bn a svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.bn a.on{color:var(--blue)}
.bn a.on svg{stroke:var(--blue)}
.bn a .badge{position:absolute;top:2px;right:calc(50% - 18px);background:var(--rose);color:#fff;font-size:.55rem;font-weight:800;border-radius:999px;padding:1px 5px;min-width:16px;text-align:center}
@media(min-width:768px){.bn{display:none}}

/* ── PAGE ── */
.pg{flex:1;padding:14px 16px;max-width:680px;margin:0 auto;width:100%}
@media(min-width:768px){.pg{padding:20px 24px;max-width:1000px}}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:10px;box-shadow:var(--sh)}
.card.tap{cursor:pointer;transition:transform .12s}.card.tap:active{transform:scale(.985)}

/* ── STAT BAND ── */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:480px){.sg{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--sh)}
.sv{font-size:2rem;font-weight:800;color:var(--navy);line-height:1}
.sl{font-size:.62rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--rs);font-size:.88rem;font-weight:700;cursor:pointer;border:none;white-space:nowrap;transition:all .15s}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bp{background:var(--blue);color:#fff}.bp:hover{background:var(--ad);transform:translateY(-1px)}
.bp:active{transform:translateY(0)}
.bs{background:var(--paper);border:1.5px solid var(--line);color:var(--ink)}.bs:hover{background:#e9edf5}
.bd{background:var(--rose);color:#fff}.bd:hover{background:#c01137}
.bg{background:transparent;color:var(--muted);padding:6px 8px}.bg:hover{background:var(--paper);color:var(--ink)}
.bsm{padding:7px 12px;font-size:.78rem;border-radius:8px}
.bf{width:100%}

/* ── FORMS ── */
.fg{margin-bottom:14px}
.fl{display:block;font-size:.7rem;font-weight:800;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fi,.fs{width:100%;border:1.5px solid var(--line);border-radius:var(--rs);padding:11px 13px;font-size:.92rem;color:var(--ink);background:var(--card);outline:none;-webkit-appearance:none;transition:border-color .15s}
.fi:focus,.fs:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ht{font-size:.72rem;color:var(--muted);margin-top:4px}

/* ── ROW ITEMS ── */
.li{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 13px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;transition:transform .12s}
.li.tap{cursor:pointer}.li.tap:active{transform:scale(.985)}
.lb{flex:1;min-width:0}
.lt{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ls{font-size:.72rem;color:var(--muted);margin-top:2px}
.lr{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* ── AVATAR ── */
.av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:.82rem;font-weight:700;flex:none}
.av.f{background:#fce4f1;color:#c0257e}
.av.m{background:#dbe6ff;color:#2851a3}
.av.n{background:#e7efff;color:#2851a3}

/* ── PILLS / CHIPS ── */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:.62rem;font-weight:700;line-height:1.5;white-space:nowrap}
.ca{background:var(--chip);color:#2851a3}
.cn{background:var(--paper);border:1px solid var(--line);color:var(--muted)}
.cs{background:#e7f7ec;color:#15803d}
.cw{background:#fef3c7;color:#92660b}
.cd{background:#fde2e1;color:#b91c1c}
.ci{background:#e7efff;color:#2851a3}
/* Quad pills */
.qg79{background:#fce4f1;color:#c0257e}
.qb79{background:#dbe6ff;color:#2851a3}
.qg1012{background:#ede9fe;color:#6d28d9}
.qb1012{background:#e7f7ec;color:#15803d}
/* At-risk pills */
.rs{background:#fde2e1;color:#b91c1c}
.ra{background:#fef3c7;color:#92660b}
.rd{background:#dbeafe;color:#1e40af}
.rw{background:#ecfdf5;color:#065f46}

/* ── PROGRESS BAR ── */
.pb{height:9px;background:var(--paper);border-radius:999px;overflow:hidden;margin:8px 0 6px;border:1px solid var(--line)}
.pb>i{display:block;height:100%;border-radius:999px;transition:width .3s}
.pf{height:100%;border-radius:999px;transition:width .3s}
.fg_{background:linear-gradient(90deg,#22c55e,#16a34a)}
.fa_{background:linear-gradient(90deg,#fbbf24,#d97706)}
.fr_{background:linear-gradient(90deg,#f87171,#dc2626)}

/* ── SECTION HEADER ── */
.sh_{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.ph{margin-bottom:14px}
.pt{font-size:1.35rem;font-weight:800;color:var(--navy);letter-spacing:-.3px}
.ps{font-size:.84rem;color:var(--muted);margin-top:3px}

/* ── MODAL / SHEET ── */
.mo{position:fixed;inset:0;background:rgba(8,14,25,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:768px){.mo{align-items:center;padding:24px}}
.mb{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:94vh;overflow-y:auto;padding:18px 16px max(18px,env(safe-area-inset-bottom));animation:rise .2s}
@media(min-width:768px){.mb{border-radius:var(--r)}}
.mh{width:40px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px}
.mt{font-size:1.05rem;font-weight:800;color:var(--navy);margin-bottom:14px}
.mb.pick{max-width:600px;max-height:96vh}

/* ── SEARCH / PICKER ── */
.srch{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--blue);border-radius:var(--r);padding:11px 13px;margin-bottom:12px}
.srch svg{flex:none;width:18px;height:18px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.srch input{border:none;outline:none;font-size:1rem;flex:1;background:none;color:var(--ink)}
.psrch{width:100%;padding:13px 14px 13px 42px;border:2px solid var(--blue);border-radius:var(--r);font-size:1rem;outline:none;margin-bottom:8px}
.plist{overflow-y:auto;max-height:calc(96vh - 180px)}
.pi{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--rs);cursor:pointer;border:none;background:none;width:100%;text-align:left;min-height:54px;transition:background .1s}
.pi:hover,.pi:focus{background:var(--chip);outline:none}
.pi.done{background:#e7f7ec;cursor:default}
.psec{font-size:.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 12px 4px;border-bottom:1px solid var(--line)}

/* ── FILTER CHIPS ── */
.fc{padding:6px 13px;border-radius:999px;font-size:.75rem;font-weight:700;border:1.5px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.fc.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.fr_2{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center}

/* ── SEGMENT CONTROL ── */
.seg{display:flex;background:var(--paper);border-radius:var(--rs);padding:4px;gap:4px;margin-bottom:12px}
.seg button{flex:1;border:none;background:none;padding:8px 4px;border-radius:8px;font-size:.78rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s}
.seg button.on{background:var(--card);color:var(--blue);box-shadow:0 2px 6px rgba(18,35,59,.12)}

/* ── ALLOCATE CARDS ── */
.ag{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:480px){.ag{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.ag{grid-template-columns:repeat(3,1fr)}}
body.phone-mode .ag{grid-template-columns:1fr!important}
/* Ensure allocate cards never overflow on narrow phone frame */
.alc{overflow:hidden;min-width:0;word-break:break-word}
.aln,.alm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Filter chip rows wrap properly on phone */
.fr_2{flex-wrap:wrap}
/* Picker modal list scrolls within the modal, not the whole page */
body.phone-mode .mb.pick{max-height:88vh}
.alc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
.aln{font-size:.92rem;font-weight:700;color:var(--navy);margin-bottom:2px}
.alm{font-size:.72rem;color:var(--muted);margin-bottom:10px}
.acb{height:9px;background:var(--paper);border-radius:999px;overflow:hidden;margin-bottom:6px;border:1px solid var(--line)}
.acf{height:100%;border-radius:999px;transition:width .3s}
.acl{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:12px}
.aab{width:100%;padding:11px;border-radius:var(--rs);background:var(--chip);color:var(--blue);font-size:.88rem;font-weight:700;cursor:pointer;border:none;text-align:center;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.aab:hover{background:#dbeafe}
.aab svg{width:16px;height:16px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ast{margin-top:12px;border-top:1px solid var(--line);padding-top:8px;max-height:200px;overflow-y:auto}
.asr{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--line)}
.asr:last-child{border-bottom:none}
.asn{flex:1;font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.asm{font-size:.68rem;color:var(--muted);flex-shrink:0}

/* ── ALERTS ── */
.al_{padding:11px 13px;border-radius:var(--rs);font-size:.82rem;margin-bottom:12px;border-left:3px solid transparent}
.ale{background:#fde2e1;color:#7f1d1d;border-color:var(--rose)}
.alo{background:#e7f7ec;color:#166534;border-color:var(--green)}
.ali{background:var(--chip);color:#2851a3;border-color:var(--blue)}
.alw{background:#fef3c7;color:#92660b;border-color:var(--amber)}

/* ── BOXES ── */
.callbox{background:#ecfdf5;border:1px solid #bbf7d0;border-radius:var(--rs);padding:12px;font-size:.84rem;color:#166534;margin-bottom:10px}
.warnbox{background:#fffbeb;border:1px solid #fcd980;border-radius:var(--rs);padding:12px;font-size:.82rem;color:#92660b;margin-bottom:10px}
.infobox{background:var(--chip);border:1px solid #cdddff;border-radius:var(--rs);padding:12px;font-size:.82rem;color:#2851a3;margin-bottom:10px}
.lb_{background:#fffbeb;border:1px solid #fcd980;border-left:4px solid var(--amber);border-radius:var(--rs);padding:11px 13px;font-size:.84rem;color:#92660b;margin-bottom:12px;font-weight:600}

/* ── DETAIL HEADER ── */
.det-hd{background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;border-radius:var(--r);padding:18px;margin-bottom:14px;text-align:center}
.det-hd .av-lg{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:1.3rem;font-weight:800;margin:0 auto 9px}
.det-hd h2{font-size:1.3rem;font-weight:800}

/* ── TILES (home quick actions) ── */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 10px;min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:transform .12s;box-shadow:var(--sh)}
.tile:active{transform:scale(.96)}
.tile .tic{width:28px;height:28px;stroke:var(--blue);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;margin-bottom:7px}
.tile .tl{font-size:.76rem;font-weight:700;color:var(--navy)}
.tile .ts{font-size:.66rem;color:var(--muted);margin-top:2px}
.tile.warn .tic{stroke:var(--rose)}
.tile.warn .tl{color:var(--rose)}

/* ── LOGIN ── */
.lpg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(130% 90% at 50% 0%,#2f6bf6,#0b1220)}
.lc{background:#fff;border-radius:var(--r);padding:24px;width:100%;max-width:380px;box-shadow:0 20px 40px rgba(0,0,0,.3)}
.ll{text-align:center;margin-bottom:20px}
.ll svg{width:48px;height:48px;stroke:var(--blue);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:8px}
.ll h1{font-size:1.4rem;font-weight:800;color:var(--navy)}
.ll p{font-size:.84rem;color:var(--muted);margin-top:4px}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.quick button{flex:1;min-width:44%;border:1px solid var(--line);background:rgba(255,255,255,.12);color:var(--ink);border-radius:10px;padding:8px;font-size:.74rem;cursor:pointer;font-weight:600;transition:background .15s}
.quick button:hover{background:#fff}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(74px + var(--sb));left:50%;transform:translateX(-50%) translateY(12px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:999px;font-size:.84rem;font-weight:600;pointer-events:none;opacity:0;transition:all .25s;z-index:300;white-space:nowrap;max-width:92vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.35)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:24px}}

/* ── UNDO TOAST ── */
#uto{position:fixed;bottom:calc(82px + var(--sb));left:50%;transform:translateX(-50%) translateY(12px);background:var(--navy);color:#fff;padding:10px 16px;border-radius:12px;font-size:.84rem;pointer-events:all;opacity:0;transition:all .25s;z-index:301;display:flex;align-items:center;gap:12px;white-space:nowrap;max-width:92vw;box-shadow:0 4px 16px rgba(0,0,0,.35)}
#uto.show{opacity:1;transform:translateX(-50%) translateY(0)}
#uto button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 11px;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;transition:background .15s}
#uto button:hover{background:rgba(255,255,255,.3)}
@media(min-width:768px){#uto{bottom:32px}}

/* ── QUAD CARDS ── */
.qc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--sh);border-left:4px solid var(--blue)}
.qc.g79{border-color:#db2777}.qc.b79{border-color:var(--blue)}.qc.g1012{border-color:#7c3aed}.qc.b1012{border-color:var(--teal)}

/* ── TAB BAR ── */
.tbbar{display:flex;background:var(--paper);border-radius:var(--rs);padding:4px;gap:4px;margin-bottom:14px}
.tbbar::-webkit-scrollbar{display:none}
.tbbtn{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:.78rem;font-weight:700;color:var(--muted);background:none;border:none;cursor:pointer;transition:all .15s}
.tbbtn.on{background:var(--card);color:var(--blue);box-shadow:0 2px 6px rgba(18,35,59,.12)}

/* ── DESTRUCTIVE SECTION ── */
.ds{border:1.5px solid #fca5a5;border-radius:var(--rs);padding:14px;margin-top:10px;background:#fff5f5}

/* ── ROLE GROUPS ── */
.rg{margin-bottom:16px}
.rgh{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:6px 0 8px;border-bottom:1px solid var(--line);margin-bottom:8px}

/* ── FIRST-RUN ── */
.frun{background:linear-gradient(135deg,var(--chip),#ede9fe);border:1px solid #cdddff;border-radius:var(--r);padding:18px;margin-bottom:16px}
.frun h3{font-size:.92rem;font-weight:800;margin-bottom:12px;color:var(--navy)}

<script>
// ── SEED DATA ──────────────────────────────────────────────
const T='2025-01-01T00:00:00.000Z';
const FN=['Olivia','Emma','Ava','Isabella','Sophia','Charlotte','Amelia','Mia','Harper','Evelyn','Abigail','Emily','Grace','Lily','Chloe','Zoe','Natalie','Hannah','Layla','Aria','Nora','Ella','Scarlett','Riley'];
const MN=['Liam','Noah','Oliver','Elijah','James','Aiden','Lucas','Grayson','Mason','Ethan','Alexander','Henry','William','Benjamin','Logan','Jackson','Sebastian','Jack','Owen','Daniel','Caleb','Samuel','Ryan','Leo'];
const SN=['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Wilson','Taylor','Anderson','Thomas','Martinez','Robinson','Clark','Lewis','Lee','Walker','Hall','Allen','Young','Wright','King','Scott','Green','Adams','Baker','Nelson','Carter','Mitchell','Roberts','Turner','Phillips','Campbell'];
// Simulated weekly session dates (last 10 Fridays)
const SESSION_DATES=['2025-02-07','2025-02-14','2025-02-21','2025-02-28','2025-03-07','2025-03-14','2025-03-21','2025-03-28','2025-04-04','2025-04-11'];
const QL={g79:'Girls Yr 7–9',b79:'Boys Yr 7–9',g1012:'Girls Yr 10–12',b1012:'Boys Yr 10–12'};

// Lifegroup definitions — two per grade, one Friday-based one Sunday-based
// Students are assigned to a lifegroup if their (idx % 2) determines which group
// gA/gT on students reflects combined attendance across their lifegroup
const LIFEGROUPS=[7,8,9,10,11,12].flatMap(gr=>[
  {id:'lg-'+gr+'a',name:'Yr '+gr+' Friday Group',day:'Friday',grade:gr},
  {id:'lg-'+gr+'b',name:'Yr '+gr+' Sunday Group',day:'Sunday',grade:gr},
]);
// Build per-lifegroup stats from student data at runtime
function lifegroupStats(scope){
  const sc=scope||students;
  return LIFEGROUPS.map(lg=>{
    // Assign students deterministically: female to 'a' groups, male to 'b' groups
    // (simulates two separate lifegroup streams per grade)
    const lgStudents=sc.filter(s=>s.grade===lg.grade&&(lg.id.endsWith('a')?s.gender==='female':s.gender==='male')).filter(s=>s.gT>0);
    const enrolled=lgStudents.length;
    const uniq=lgStudents.filter(s=>s.gA>0).length;
    const totAtt=lgStudents.reduce((s,x)=>s+x.gA,0);
    const totSess=lgStudents.reduce((s,x)=>s+x.gT,0);
    const weeksRun=enrolled>0?Math.max(0,...lgStudents.map(s=>s.gT)):0;
    const pct=totSess>0?Math.round(totAtt/totSess*100):0;
    const avg=enrolled>0?Math.round(totAtt/enrolled):0;           // avg sessions/student
    const avgPerSess=weeksRun>0?Math.round(totAtt/weeksRun):0;    // avg students/session
    return{...lg,enrolled,uniq,totAtt,totSess,weeksRun,pct,avg,avgPerSess};
  });
}

function cq(grade,gender){if(!grade)return null;const f=gender==='female';if(grade<=9)return f?'g79':'b79';return f?'g1012':'b1012';}
function cs(sA,sT,gA,gT){const r=sT>0?sA/sT:null;if(!sT&&!gT)return'new';if(sT>=3&&!sA)return'stopped';if(r!==null&&r<0.5)return'atrisk';if(r!==null&&r<0.75)return'declining';return'regular';}

let _c=1000; const uid=()=>'i'+(++_c);

// ── PERSISTENT DEMO STORAGE ──
// Saves mutable demo state to localStorage so changes survive page refresh.
const _STORE_KEY='yap_demo_v2';
function persist(){
  try{
    localStorage.setItem(_STORE_KEY,JSON.stringify({
      allocations,leaders,settings,importHistory,auditLog,_c
    }));
  }catch{}
}
function restorePersistedData(){
  try{
    const raw=localStorage.getItem(_STORE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(d.allocations)allocations=d.allocations;
    if(d.leaders)leaders=d.leaders;
    if(d.settings)settings=d.settings;
    if(d.importHistory)importHistory=d.importHistory;
    if(d.auditLog)auditLog=d.auditLog;
    if(d._c)_c=d._c;
    return true;
  }catch{return false;}
}
function clearPersistedData(){
  try{localStorage.removeItem(_STORE_KEY);}catch{}
}
let users=[
  {id:'u-admin',n:'Admin',email:'admin@youth.ministry',role:'admin',grade:null,quad:null,active:true},
  {id:'u-dir',n:'Director',email:'director@youth.ministry',role:'director',grade:null,quad:null,active:true},
  {id:'u-g79',n:'Girls Yr 7–9',email:'g79@youth.ministry',role:'quad',grade:null,quad:'g79',active:true},
  {id:'u-b79',n:'Boys Yr 7–9',email:'b79@youth.ministry',role:'quad',grade:null,quad:'b79',active:true},
  {id:'u-g1012',n:'Girls Yr 10–12',email:'g1012@youth.ministry',role:'quad',grade:null,quad:'g1012',active:true},
  {id:'u-b1012',n:'Boys Yr 10–12',email:'b1012@youth.ministry',role:'quad',grade:null,quad:'b1012',active:true},
  {id:'u-gr7f',n:'Grade 7 Girls',email:'grade7f@youth.ministry',role:'grade',grade:7,gender:'female',quad:null,active:true},
  {id:'u-gr7m',n:'Grade 7 Boys',email:'grade7m@youth.ministry',role:'grade',grade:7,gender:'male',quad:null,active:true},
  {id:'u-gr8f',n:'Grade 8 Girls',email:'grade8f@youth.ministry',role:'grade',grade:8,gender:'female',quad:null,active:true},
  {id:'u-gr8m',n:'Grade 8 Boys',email:'grade8m@youth.ministry',role:'grade',grade:8,gender:'male',quad:null,active:true},
  {id:'u-gr9f',n:'Grade 9 Girls',email:'grade9f@youth.ministry',role:'grade',grade:9,gender:'female',quad:null,active:true},
  {id:'u-gr9m',n:'Grade 9 Boys',email:'grade9m@youth.ministry',role:'grade',grade:9,gender:'male',quad:null,active:true},
  {id:'u-gr10f',n:'Grade 10 Girls',email:'grade10f@youth.ministry',role:'grade',grade:10,gender:'female',quad:null,active:true},
  {id:'u-gr10m',n:'Grade 10 Boys',email:'grade10m@youth.ministry',role:'grade',grade:10,gender:'male',quad:null,active:true},
  {id:'u-gr11f',n:'Grade 11 Girls',email:'grade11f@youth.ministry',role:'grade',grade:11,gender:'female',quad:null,active:true},
  {id:'u-gr11m',n:'Grade 11 Boys',email:'grade11m@youth.ministry',role:'grade',grade:11,gender:'male',quad:null,active:true},
  {id:'u-gr12f',n:'Grade 12 Girls',email:'grade12f@youth.ministry',role:'grade',grade:12,gender:'female',quad:null,active:true},
  {id:'u-gr12m',n:'Grade 12 Boys',email:'grade12m@youth.ministry',role:'grade',grade:12,gender:'male',quad:null,active:true},
];
// 20 leaders: 2F+2M for Yr 7–10, 1F+1M for Yr 11–12
let leaders=[
  {id:'l-g7f1',fn:'Sarah Mitchell',gender:'female',grades:[7],g:7,active:true},
  {id:'l-g7f2',fn:'Amy Peterson',gender:'female',grades:[7],g:7,active:true},
  {id:'l-g7m1',fn:'James Thompson',gender:'male',grades:[7],g:7,active:true},
  {id:'l-g7m2',fn:'Ryan Foster',gender:'male',grades:[7],g:7,active:true},
  {id:'l-g8f1',fn:'Emma Clarke',gender:'female',grades:[8],g:8,active:true},
  {id:'l-g8f2',fn:'Jess Palmer',gender:'female',grades:[8],g:8,active:true},
  {id:'l-g8m1',fn:'Michael Roberts',gender:'male',grades:[8],g:8,active:true},
  {id:'l-g8m2',fn:'Ben Cooper',gender:'male',grades:[8],g:8,active:true},
  {id:'l-g9f1',fn:'Rachel Green',gender:'female',grades:[9],g:9,active:true},
  {id:'l-g9f2',fn:'Lauren Kim',gender:'female',grades:[9],g:9,active:true},
  {id:'l-g9m1',fn:'David Kim',gender:'male',grades:[9],g:9,active:true},
  {id:'l-g9m2',fn:'Mark Sullivan',gender:'male',grades:[9],g:9,active:true},
  {id:'l-g10f1',fn:'Natasha Brown',gender:'female',grades:[10],g:10,active:true},
  {id:'l-g10f2',fn:'Alicia Torres',gender:'female',grades:[10],g:10,active:true},
  {id:'l-g10m1',fn:'Chris Wilson',gender:'male',grades:[10],g:10,active:true},
  {id:'l-g10m2',fn:'Jordan Price',gender:'male',grades:[10],g:10,active:true},
  {id:'l-g11f1',fn:'Danielle Cox',gender:'female',grades:[11],g:11,active:true},
  {id:'l-g11m1',fn:'Josh Patel',gender:'male',grades:[11],g:11,active:true},
  {id:'l-g12f1',fn:'Victoria Stone',gender:'female',grades:[12],g:12,active:true},
  {id:'l-g12m1',fn:'Nathan Burns',gender:'male',grades:[12],g:12,active:true},
];
// ── STUDENT SEED ──
// 400 students across Yr 7–12 with varied attendance profiles
// Count per grade×gender: Yr7 18+18, Yr8 17+17, Yr9 17+17, Yr10 16+16, Yr11 16+16, Yr12 16+16 = 400
// Per-gender counts — total = (36+34+34+32+32+32)×1 each gender = 200F+200M = 400
const GRADE_COUNTS={7:36,8:34,9:34,10:32,11:32,12:32};
let students=[];
{
  let idx=0;
  for(const gr of[7,8,9,10,11,12]){
    for(const gd of['female','male']){
      const pool=gd==='female'?FN:MN;
      const count=GRADE_COUNTS[gr];
      for(let i=0;i<count;i++){
        // Richer deterministic seed — 7 attendance profiles with grade-weighted distribution
        // Higher grades skew slightly lower attendance (more commitments)
        const raw=(idx*31+i*17+gr*7)%120;
        // Profile thresholds shift with grade: older grades have more low-attenders
        const shift=Math.floor((gr-7)*3); // 0..15
        const p=raw+shift;
        let sA,sT=10,gA,gT=6;
        if(p<6){sA=0;gA=0;sT=0;gT=0;}          // no data — new/unknown
        else if(p<14){sA=0;gA=0;}               // stopped attending
        else if(p<22){sA=1+(p%3);gA=0;}         // very low / at-risk
        else if(p<34){sA=3+(p%3);gA=1+(p%2);}   // declining
        else if(p<54){sA=5+(p%3);gA=3+(p%2);}   // middling
        else if(p<80){sA=7+(p%3);if(sA>10)sA=10;gA=4+(p%2);if(gA>6)gA=6;} // good
        else{sA=9+(p%2);if(sA>10)sA=10;gA=5+(p%2);if(gA>6)gA=6;}           // excellent

        // Previous-term data — at-risk students had better attendance last term
        let psA=0,psT=0,pgA=0,pgT=0;
        if(sT>0&&sA<5){psT=10;pgT=6;psA=5+(p%4);if(psA>8)psA=8;pgA=3+(p%3);if(pgA>5)pgA=5;}

        // Per-session attendance history
        const hist=[];for(let w=0;w<sT;w++){hist.push(sA>0&&(p+w*13)%10<Math.round(sA/sT*10));}
        let curA=hist.filter(Boolean).length;
        while(curA<sA){const fi=hist.findIndex(x=>!x);if(fi<0)break;hist[fi]=true;curA++;}
        while(curA>sA){let fi=-1;for(let k=hist.length-1;k>=0;k--){if(hist[k]){fi=k;break;}}if(fi<0)break;hist[fi]=false;curA--;}

        const yr=2025-gr-12+(gr<10?1:0);
        const bday=yr+'-'+String((idx%12)+1).padStart(2,'0')+'-'+String((idx*7%28)+1).padStart(2,'0');
        const ph='04'+String(10000000+(idx*73+i*31)%80000000);
        const pp='04'+String(10000000+(idx*97+i*41)%80000000);
        students.push({id:'s-'+idx,fn:pool[i%pool.length],ln:SN[(idx*7+i*3)%SN.length],gender:gd,grade:gr,quad:cq(gr,gd),sA,sT,gA,gT,ar:cs(sA,sT,gA,gT),psA,psT,pgA,pgT,hist,bday,ph,pp,createdAt:T});
        idx++;
      }
    }
  }
}

let allocations=[];
let settings={ministryName:'Youth Ministry',serviceName:'Fridays',lifegroupName:'Lifegroup',lockDate:null,regN:3,regD:4,riskN:1,riskD:2};

// Leader roster indexed for allocation seeding
const _LEADER_MAP={
  female:{
    7:['l-g7f1','l-g7f2'],
    8:['l-g8f1','l-g8f2'],
    9:['l-g9f1','l-g9f2'],
    10:['l-g10f1','l-g10f2'],
    11:['l-g11f1'],
    12:['l-g12f1'],
  },
  male:{
    7:['l-g7m1','l-g7m2'],
    8:['l-g8m1','l-g8m2'],
    9:['l-g9m1','l-g9m2'],
    10:['l-g10m1','l-g10m2'],
    11:['l-g11m1'],
    12:['l-g12m1'],
  }
};

// Restore persisted state; seed allocations only on first load
if(!restorePersistedData()){
  // Seed ~60% of students allocated, spread evenly across leaders per grade×gender
  let ai=1;
  for(const gd of['female','male']){
    for(const gr of[7,8,9,10,11,12]){
      const pool=students.filter(s=>s.grade===gr&&s.gender===gd);
      const leaderIds=_LEADER_MAP[gd][gr]||[];
      if(!leaderIds.length)continue;
      // Allocate 60% — prioritise students who attended at least once
      const active=pool.filter(s=>s.sA>0||s.gA>0);
      const passive=pool.filter(s=>s.sA===0&&s.gA===0&&s.sT>0);
      const target=Math.round(pool.length*0.60);
      const toAlloc=[...active,...passive].slice(0,target);
      toAlloc.forEach((s,i)=>{
        const lid=leaderIds[i%leaderIds.length];
        allocations.push({id:'a-'+ai++,sid:s.id,lid,role:'grade',at:T});
      });
    }
  }
  persist();
}

// ── TRENDS ENGINE ──
// Build per-session attendance counts from student hist arrays
function buildTrends(scope){
  const sc=scope||students;
  // Per session (index 0..9)
  const svcSessions=SESSION_DATES.map((date,wi)=>{
    const att=sc.filter(s=>s.hist&&s.hist[wi]).length;
    const tot=sc.filter(s=>s.sT>wi).length;
    return{date,att,tot,pct:tot>0?Math.round(att/tot*100):0};
  });
  // Group attendance: lifegroups run on different days — not every student is in one.
  // Count only students enrolled in a lifegroup (gT > 0) and use their attendance records.
  const grpMembers=sc.filter(s=>s.gT>0);
  const grpTotal=grpMembers.reduce((s,x)=>s+x.gT,0);
  const grpAtt=grpMembers.reduce((s,x)=>s+x.gA,0);
  const grpPct=grpTotal>0?Math.round(grpAtt/grpTotal*100):0;
  const grpUniqAtt=grpMembers.filter(s=>s.gA>0).length;
  const grpEnrolled=grpMembers.length;
  const grpWeeksRun=grpEnrolled>0?Math.max(0,...grpMembers.map(s=>s.gT)):0;
  // Per-grade breakdown
  const byGrade=[7,8,9,10,11,12].map(gr=>{
    const gs=sc.filter(s=>s.grade===gr);
    const gsvcSess=SESSION_DATES.map((date,wi)=>{
      const att=gs.filter(s=>s.hist&&s.hist[wi]).length;
      const tot=gs.filter(s=>s.sT>wi).length;
      return{date,att,tot,pct:tot>0?Math.round(att/tot*100):0};
    });
    const totSvc=gs.reduce((s,x)=>s+x.sT,0);
    const attSvc=gs.reduce((s,x)=>s+x.sA,0);
    const grpM=gs.filter(s=>s.gT>0); // only enrolled students
    const totGrp=grpM.reduce((s,x)=>s+x.gT,0);
    const attGrp=grpM.reduce((s,x)=>s+x.gA,0);
    return{grade:gr,count:gs.length,svcSess:gsvcSess,svcPct:totSvc>0?Math.round(attSvc/totSvc*100):0,grpPct:totGrp>0?Math.round(attGrp/totGrp*100):0,totGrp,attGrp,grpEnrolled:grpM.length,grpUniqAtt:grpM.filter(s=>s.gA>0).length};
  });
  // Per-quad breakdown
  const byQuad=['g79','b79','g1012','b1012'].map(q=>{
    const qs=sc.filter(s=>s.quad===q);
    const qsvcSess=SESSION_DATES.map((date,wi)=>{
      const att=qs.filter(s=>s.hist&&s.hist[wi]).length;
      const tot=qs.filter(s=>s.sT>wi).length;
      return{date,att,tot,pct:tot>0?Math.round(att/tot*100):0};
    });
    const totSvc=qs.reduce((s,x)=>s+x.sT,0);
    const attSvc=qs.reduce((s,x)=>s+x.sA,0);
    const totGrp=qs.reduce((s,x)=>s+x.gT,0);
    const attGrp=qs.reduce((s,x)=>s+x.gA,0);
    return{quad:q,label:QL[q],count:qs.length,svcSess:qsvcSess,svcPct:totSvc>0?Math.round(attSvc/totSvc*100):0,grpPct:totGrp>0?Math.round(attGrp/totGrp*100):0};
  });
  // Overall trend direction (first half vs second half average)
  function trendDir(sessions){
    const valid=sessions.filter(s=>s.tot>0);
    if(valid.length<4)return'stable';
    const h1=valid.slice(0,Math.floor(valid.length/2)).reduce((s,x)=>s+x.pct,0)/Math.floor(valid.length/2);
    const h2=valid.slice(Math.floor(valid.length/2)).reduce((s,x)=>s+x.pct,0)/(valid.length-Math.floor(valid.length/2));
    if(h2-h1>4)return'up';if(h1-h2>4)return'down';return'stable';
  }
  return{svcSessions,grpPct,grpUniqAtt,grpEnrolled,grpWeeksRun,byGrade,byQuad,trendDir};
}

function scopeS(actor,list){
  if(actor.role==='grade'){
    let r=list.filter(s=>s.grade===actor.grade);
    if(actor.gender)r=r.filter(s=>s.gender===actor.gender);
    return r;
  }
  if(actor.role==='quad'){const fq=['g79','g1012'],isF=fq.includes(actor.quad),isJr=actor.quad==='g79'||actor.quad==='b79';return list.filter(s=>(isF?s.gender==='female':s.gender==='male')&&(isJr?s.grade<=9:s.grade>=10));}
  return list;
}
function scopeL(actor,list){
  if(actor.role==='grade'){
    let r=list.filter(l=>l.active&&l.grades.includes(actor.grade));
    if(actor.gender)r=r.filter(l=>!l.gender||l.gender===actor.gender);
    return r;
  }
  if(actor.role==='quad'){const isJr=actor.quad==='g79'||actor.quad==='b79';return list.filter(l=>l.active&&l.grades.some(g=>isJr?g<=9:g>=10));}
  return list.filter(l=>l.active);
}

function overview(actor){
  const aIds=new Set(allocations.map(a=>a.sid));
  const sc=scopeS(actor,students);
  const qd={};['g79','b79','g1012','b1012'].forEach(q=>{qd[q]={t:0,a:0,r:0};});
  const gd={};[7,8,9,10,11,12].forEach(g=>{gd[g]={t:0,a:0,r:0};});
  let tot=0,alc=0,rsk=0;
  for(const s of sc){tot++;const ia=aIds.has(s.id),ir=AR.has(s.ar);if(ia)alc++;if(ir)rsk++;if(s.quad&&qd[s.quad]){qd[s.quad].t++;if(ia)qd[s.quad].a++;if(ir)qd[s.quad].r++;}if(s.grade&&gd[s.grade]){gd[s.grade].t++;if(ia)gd[s.grade].a++;if(ir)gd[s.grade].r++;}}
  const aL=leaders.filter(l=>l.active);
  return{tot,alc,un:tot-alc,rsk,leaderCount:aL.length,
    byQuad:['g79','b79','g1012','b1012'].map(q=>({quad:q,label:QL[q],t:qd[q].t,a:qd[q].a,r:qd[q].r})),

// Format ISO date string (YYYY-MM-DD or full ISO) as D/M
function fmtDM(iso){if(!iso)return'—';const d=new Date(iso);return d.getUTCDate()+'/'+(d.getUTCMonth()+1);}
// Format ISO timestamp as D/M H:MM
function fmtDMT(iso){if(!iso)return'—';const d=new Date(iso);return d.getUTCDate()+'/'+(d.getUTCMonth()+1)+' '+String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');}

// ── CHIP HELPERS ──
function rChip(ar){if(!ar||ar==='regular'||ar==='new')return'';const m={stopped:['Stopped','rs'],atrisk:['At Risk','ra'],declining:['Declining','rd'],watch:['Watch','rw']};const[l,c]=m[ar]||[ar,'cn'];return '<span class="chip '+c+'">'+l+'</span>';}
function qChip(q){return q?'<span class="chip q'+q+'">'+(QL[q]||q)+'</span>':'';}
function pct(s){return s.sT>0?Math.round(s.sA/s.sT*100):null;}
function pbar(p){const c=p>=70?'fg_':p>=40?'fa_':'fr_';return '<div class="pb"><i class="'+c+'" style="width:'+p+'%"></i></div>';}

// Student is "active" = attended ≥2 of last 10 combined events (workflow priority)
function isActive(s){return(s.sA+s.gA)>=2;}

// ── LEADERS + ALLOCATE (merged) ──
// Filter state (grade/gender chips)
let _aS={gf:new Set(),df:new Set()};
let _pCtx=null;

function renderLeaders(){
  restAF();
  const u=S.user,actor={role:u.role,grade:u.grade,quad:u.quad,gender:u.gender};
  const ce=['grade','director','admin'].includes(u.role);
  const sc=scopeS(actor,students);
  const aIds=new Set(allocations.map(a=>a.sid));
  const activeStudents=sc.filter(s=>isActive(s));
  const pendingActive=activeStudents.filter(s=>!aIds.has(s.id)).length;

  // Apply filters
  let ls=scopeL(actor,leaders);
  if(_aS.gf.size)ls=ls.filter(l=>l.grades.some(g=>_aS.gf.has(g)));
  if(_aS.df.size)ls=ls.filter(l=>!l.gender||_aS.df.has(l.gender));

  // Scoped grade options for filter chips
  const lGrades=u.role==='quad'?(u.quad==='g79'||u.quad==='b79'?[7,8,9]:[10,11,12])
    :['director','admin'].includes(u.role)?[7,8,9,10,11,12]:[];
  const lGenders=['director','admin'].includes(u.role)?['male','female']:[];
  const gC=lGrades.map(g=>'<button class="fc'+(_aS.gf.has(g)?' on':'')+'" onclick="tAF(\'g\','+g+')">'+g+'</button>').join('');
  const dC=lGenders.map(g=>'<button class="fc'+(_aS.df.has(g)?' on':'')+'" onclick="tAF(\'d\',\''+g+'\')">'+g.charAt(0).toUpperCase()+g.slice(1)+'</button>').join('');
  const anyFilter=_aS.gf.size||_aS.df.size;

  // Page header
  let b='<div class="ph"><div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">';
  b+='<div><div class="pt">Leaders &amp; Allocation</div><div class="ps">'+aIds.size+'/'+sc.length+' allocated'+(pendingActive?' · <strong style="color:var(--amber)">'+pendingActive+' active pending</strong>':' · all active covered')+'</div></div>';
  b+='<div style="display:flex;gap:6px">';
  b+='<button class="btn bs bsm" onclick="expCSV()" title="Export CSV">'+IC.export.replace('<svg ','<svg style="width:14px;height:14px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" ')+'</button>';
  if(ce)b+='<button class="btn bp bsm" onclick="showAddL()">'+IC.plus.replace('<svg ','<svg style="width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;margin-right:3px" ')+' Add Leader</button>';
  b+='</div></div></div>';

  // Status banner
  if(pendingActive>0)
    b+='<div class="warnbox">'+IC.alert.replace('<svg ','<svg style="width:14px;height:14px;stroke:var(--amber);fill:none;stroke-width:2;vertical-align:middle;margin-right:5px" ')+'<strong>'+pendingActive+' active student'+(pendingActive!==1?'s':'')+' need a leader</strong> — attended ≥2 events. Tap <strong>+ Add</strong> on any card below.</div>';
  else if(sc.length>0)
    b+='<div class="callbox">'+IC.check.replace('<svg ','<svg style="width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:2.5;vertical-align:middle;margin-right:5px" ')+' All active students have a leader.</div>';

  if(u.role==='quad')
    b+='<div class="infobox">'+IC.info.replace('<svg ','<svg style="width:14px;height:14px;stroke:var(--blue);fill:none;stroke-width:2;vertical-align:middle;margin-right:5px" ')+' View-only — contact a grade login to make changes.</div>';

  // Grade filter chips — quad sees their bracket; director/admin see all
  if(lGrades.length){
    b+='<div class="fr_2"><span style="font-size:.7rem;font-weight:800;color:var(--muted)">YR</span>'+gC;
    if(anyFilter)b+='<button class="fc" onclick="tAF(\'x\',0)" style="opacity:.6">Clear</button>';
    b+='</div>';
  }
  // Gender filter — director/admin only
  if(lGenders.length){
    b+='<div class="fr_2"><span style="font-size:.7rem;font-weight:800;color:var(--muted)">GENDER</span>'+dC+'</div>';
  }

  // Empty state
  if(!ls.length){
    b+='<div class="empty">'+IC.users.replace('<svg ','<svg ')+'<p>No leaders'+(anyFilter?' match filters':' in your scope')+'</p>';
    if(ce&&!anyFilter)b+='<p style="font-size:.8rem;margin-top:6px">Add your first leader to start allocating.</p>';
    b+='</div>';
    setApp(shell(b));return;
  }

  // Leader allocation cards
  // Pre-build allocation map: leaderId → Set of studentIds (O(allocations) once)
  const allocsByLeader=new Map();
  for(const a of allocations){
    if(!allocsByLeader.has(a.lid))allocsByLeader.set(a.lid,new Set());
    allocsByLeader.get(a.lid).add(a.sid);
  }
  // Pre-compute capacity targets per gender key (same result for every leader of the same gender)
  const capacityTarget={};
  for(const gKey of['female','male','']){
    const sgl=ls.filter(ll=>!ll.gender||ll.gender===gKey).length||1;
    const sgs=sc.filter(s=>!gKey||s.gender===gKey).length;
    capacityTarget[gKey]=Math.max(1,Math.round(sgs/sgl));
  }

  b+='<div class="ag">';
  for(const l of ls){
    const lAllocIds=allocsByLeader.get(l.id)||new Set();
    const as=sc.filter(s=>lAllocIds.has(s.id));
    const n=as.length;
    const atRskCnt=as.filter(s=>AR.has(s.ar)).length;
    const avCls=l.gender==='female'?'f':l.gender==='male'?'m':'n';

    // Capacity gauge (pre-computed above)
    const target=capacityTarget[l.gender||'']||1;
    const gaugePct=Math.min(100,Math.round(n/target*100));
    const gaugeCol=gaugePct>=90?'fr_':gaugePct>=55?'fg_':'fa_';

    // Student rows (cap at 8, show overflow link)
    let sr='';
    for(const s of as.slice(0,8)){
      const sp=pct(s);
      const actBadge=isActive(s)?'':'<span class="chip cn" style="font-size:.55rem;padding:1px 5px">optional</span>';
      sr+='<div class="asr">'
        +'<div class="av '+avCls+'" style="width:26px;height:26px;font-size:.65rem;flex:none">'+s.fn.charAt(0)+'</div>'
        +'<div style="flex:1;min-width:0"><div class="asn">'+s.fn+' '+s.ln+' '+actBadge+'</div>'
        +'<div class="asm">Yr '+s.grade+(sp!==null?' · '+sp+'%':'')+(rChip(s.ar)?' · '+rChip(s.ar):'')+'</div></div>'
        +(ce?'<button style="background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;flex:none;transition:color .15s" onclick="remAU(\''+s.id+'\',\''+l.id+'\')" aria-label="Remove '+s.fn+'">'+IC.x.replace('<svg ','<svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" ')+'</button>':'')
        +'</div>';
    }
    if(as.length>8)sr+='<div style="text-align:center;padding:5px 0;font-size:.74rem;color:var(--muted)">+'+( as.length-8)+' more</div>';

    b+='<div class="alc">';
    // Card header: avatar + name + edit/delete
    b+='<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">';
    b+='<div class="av '+avCls+'" style="flex:none">'+l.fn.charAt(0)+'</div>';
    b+='<div style="flex:1;min-width:0"><div class="aln">'+l.fn+'</div><div class="alm">Yr '+l.grades.join(', ')+' · '+(l.gender||'any gender')+'</div></div>';
    if(ce){
      b+='<div style="display:flex;gap:2px;flex-shrink:0">';
      b+='<button class="btn bg bsm" onclick="showEL(\''+l.id+'\')" aria-label="Edit" style="padding:5px">'+IC.edit.replace('<svg ','<svg style="width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" ')+'</button>';
      b+='<button class="btn bg bsm" onclick="delL(\''+l.id+'\')" aria-label="Delete" style="padding:5px">'+IC.trash.replace('<svg ','<svg style="width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" ')+'</button>';
      b+='</div>';
    }
    b+='</div>';
    // Capacity gauge
    b+='<div class="acb"><div class="acf '+gaugeCol+'" style="width:'+gaugePct+'%"></div></div>';
    b+='<div class="acl"><span><strong>'+n+'</strong> / ~'+target+' students</span>'+(atRskCnt?'<span style="color:var(--rose)">⚠ '+atRskCnt+' at risk</span>':'<span style="color:var(--green)">All clear</span>')+'</div>';
    // Add students button (editable roles only)
    if(ce)b+='<button class="aab" onclick="openPicker(\''+l.id+'\')">'+IC.plus.replace('<svg ','<svg style="width:15px;height:15px;stroke:var(--blue);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round" ')+' Add Students</button>';
    // Student list
    if(as.length)b+='<div class="ast">'+sr+'</div>';
    b+='</div>';
  }
  b+='</div>';
  setApp(shell(b));
}

function tAF(t,v){
  if(t==='g'){_aS.gf.has(v)?_aS.gf.delete(v):_aS.gf.add(v);}
  else if(t==='d'){_aS.df.has(v)?_aS.df.delete(v):_aS.df.add(v);}
  else{_aS.gf.clear();_aS.df.clear();}
  saveAF();renderLeaders();
}

  const l=leaders.find(x=>x.id===lid);if(!l)return;

function fPicker(){
  const q=(document.getElementById('pq')||{value:''}).value.toLowerCase().trim();
  const filter=(document.getElementById('p-filter')||{value:'default'}).value;
  const ctx=_pCtx;if(!ctx)return;
  const done=ctx.done;
  let pool;
  if(q){
    // Search: all same-gender students regardless of grade/allocation/attendance
    pool=ctx.allSameGender;
  } else if(filter==='low'){
    // Fewer than 20% attendance (Fridays)
    pool=ctx.defaultPool.filter(s=>s.sT>0&&s.sA/s.sT<0.2);
  } else if(filter==='unalloc'){
    // Same gender, NOT in leader's home grades, not yet allocated to anyone
    const allocdIds=new Set(allocations.map(a=>a.sid));
    pool=ctx.allSameGender.filter(s=>!ctx.l.grades.includes(s.grade)&&!allocdIds.has(s.id));
  } else {
    // Default: leader's gender + grade match
    pool=ctx.defaultPool;
  }
  let list=q?pool.filter(s=>{const t=q.split(/\s+/);const txt=(s.fn+' '+s.ln+' '+(s.grade||'')).toLowerCase();return t.every(x=>txt.includes(x));}):pool;
  const asgn=list.filter(s=>done.has(s.id));
  const avail=list.filter(s=>!done.has(s.id));
  avail.sort((a,b)=>(isActive(b)?1:0)-(isActive(a)?1:0)||a.ln.localeCompare(b.ln));
  const active=avail.filter(s=>isActive(s));
  const other=avail.filter(s=>!isActive(s));
  let h='';
  if(asgn.length){

let _trTab='svc',_trQuad=null,_trGrade=null,_trGradeOpen=null,_trQuadOpen=null;

// Helper: render a column chart from session data
function colChart(sessions,maxH){
  const max=Math.max(...sessions.map(s=>s.pct),1);
  const cols=sessions.map((s)=>{
    const h=s.pct?Math.round(s.pct/max*(maxH||56))+4:4;
    const lbl=fmtDM(s.date||'');
    return'<div class="ccol"><div class="ccol-bar '+(s.pct>=70?'':s.pct<40?'cr':'lo')+'" style="height:'+h+'px"></div><div class="ccol-lbl">'+lbl+'</div></div>';
  }).join('');
  return'<div class="cchart">'+cols+'</div>';
}

// Helper: render a horizontal bar row
// pct drives bar width; disp overrides the displayed value (default pct+'%')
function hbar(label,pct,sub,disp){
  const shown=disp!==undefined?disp:pct+'%';
  return'<div class="tbar-row"><div class="tbar-lbl">'+label+'</div><div class="tbar-track"><div class="tbar-fill '+(pct<40?'crit':pct<70?'low':'')+'" style="width:'+pct+'%"></div></div><div class="tbar-val">'+shown+(sub?'<br><span style="font-size:.6rem">'+sub+'</span>':'')+'</div></div>';
}
// Avg headcount per session from session array
function avgAtt(sessions){const v=sessions.filter(s=>s.tot>0);return v.length?Math.round(v.reduce((s,x)=>s+x.att,0)/v.length):0;}

// Helper: trend arrow badge
function trendBadge(dir){if(dir==='up')return'<span class="tr-up">↑ Improving</span>';if(dir==='down')return'<span class="tr-dn">↓ Declining</span>';return'<span class="tr-st">→ Stable</span>';}

function renderTrends(){
  const u=S.user,actor={role:u.role,grade:u.grade,quad:u.quad,gender:u.gender};
  const canExport=['quad','director','admin'].includes(u.role);
  let b='<div class="ph"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><div><div class="pt">Attendance Trends</div><div class="ps">Session &amp; lifegroup overview</div></div>';
  if(canExport)b+='<button class="btn bs bsm" onclick="exportTrends()" style="display:flex;align-items:center;gap:5px">'+IC.export.replace('<svg ','<svg style="width:14px;height:14px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" ')+' Export</button>';
  b+='</div></div>';

  b+='<div class="tbbar"><button class="tbbtn'+(_trTab==='svc'?' on':'')+'" onclick="_trTab=\'svc\';_trGradeOpen=null;_trQuadOpen=null;renderTrends()">Fridays</button><button class="tbbtn'+(_trTab==='grp'?' on':'')+'" onclick="_trTab=\'grp\';_trGradeOpen=null;_trQuadOpen=null;renderTrends()">Lifegroups</button></div>';

  const allSc=scopeS(actor,students);
  const td=buildTrends(allSc);

  // ── SHARED: stat card helper ──
  // nums/labels/prevs are parallel arrays; layout auto-selects 2 or 3 columns
  function statCard(nums,labels,prevs){
    const cols=nums.length;
    const fz=cols===3?'1.25rem':'1.6rem';
    return '<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:6px;margin-top:10px">'
      +nums.map((n,i)=>
        '<div style="text-align:center;padding:9px 4px;background:var(--paper);border-radius:var(--rs)">'
        +'<div style="font-size:'+fz+';font-weight:800;color:var(--navy);line-height:1">'+n+'</div>'
        +'<div style="font-size:.58rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:3px">'+labels[i]+'</div>'
        +(prevs&&prevs[i]?'<div style="font-size:.56rem;color:var(--muted);opacity:.55;margin-top:3px">'+prevs[i]+'</div>':'')
        +'</div>'
      ).join('')
      +'</div>';
  }
  // Backwards-compat wrapper used by Fridays sections (two columns)
  function twoNum(n1,l1,n2,l2,prevLine){
    return statCard([n1,n2],[l1,l2],prevLine?[prevLine[0],prevLine[1]]:null);
  }
  // Group stats bar: shows enrolled/unique/weeksRun visually as a stacked horizontal bar
  // uniqRatio = uniq/enrolled (attendance breadth); pctAtt = avg attendance rate
  function grpBar(uniq,enrolled,weeksRun,avg,avgPerSess){
    const uniqPct=enrolled?Math.round(uniq/enrolled*100):0;
    const fillCls=uniqPct>=75?'fg_':uniqPct>=50?'fa_':'fr_';

      +'<div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--muted);margin-bottom:3px">'
      +'<span>'+uniq+' of '+enrolled+' enrolled attended at least once</span>'
      +'<span>'+uniqPct+'%</span>'
      +'</div>'
      +'<div class="pb"><i class="'+fillCls+'" style="width:'+uniqPct+'%"></i></div>'
      +'</div>';
  }

  if(_trTab==='svc'){
    // ── FRIDAYS ──
    const miniDir=td.trendDir(td.svcSessions);
    const miniUniq=allSc.filter(s=>s.sA>0).length;
    const miniAvgAtt=avgAtt(td.svcSessions);
    // Prev-term comparison for scope

    const prevAvgAtt=allSc.filter(s=>s.psT>0).length
      ?Math.round(allSc.filter(s=>s.psT>0).reduce((s,x)=>s+x.psA,0)/Math.max(...allSc.filter(s=>s.psT>0).map(s=>s.psT))):0;

          ?Math.round(grSc.filter(s=>s.psT>0).reduce((s,x)=>s+x.psA,0)/Math.max(...grSc.filter(s=>s.psT>0).map(s=>s.psT))):0;

          const gPrevAvg=gSc.filter(s=>s.psT>0).length
            ?Math.round(gSc.filter(s=>s.psT>0).reduce((s,x)=>s+x.psA,0)/Math.max(...gSc.filter(s=>s.psT>0).map(s=>s.psT))):0;

function exportTrends(){
  const u=S.user,actor={role:u.role,grade:u.grade,quad:u.quad,gender:u.gender};
  const sc=scopeS(actor,students);
  const td=buildTrends(sc);
  // Build CSV: session date, attendance count, attendance %, per-quad breakdown
  const rows=[['Date','Ministry Att','Ministry %',...['g79','b79','g1012','b1012'].map(q=>QL[q]+' Att'),...['g79','b79','g1012','b1012'].map(q=>QL[q]+' %')]];
  SESSION_DATES.forEach((date,i)=>{
    const ms=td.svcSessions[i];
    const qVals=td.byQuad.flatMap(q=>[q.svcSess[i].att,q.svcSess[i].pct]);
    rows.push([date,ms.att,ms.pct+'%',...qVals]);
  });
  rows.push([]);
  rows.push(['Grade','Students','Fridays %','Lifegroup %']);
  for(const g of td.byGrade){if(g.count)rows.push(['Yr '+g.grade,g.count,g.svcPct+'%',g.grpPct+'%']);}
  const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='attendance-trends-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast('Trends exported');
}

// Normalise a column header that may be an Excel short-date (e.g. "7-Feb", "14-Mar")
// Returns ISO YYYY-MM-DD or null if not a date header.
const _MONTH_MAP={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
function normDateHdr(h){
  if(/^\d{4}-\d{2}-\d{2}$/.test(h))return h;
  const m=h.match(/^(\d{1,2})-([a-z]{3})(?:-(\d{2,4}))?$/);
  if(!m)return null;
  const mon=_MONTH_MAP[m[2]];if(!mon)return null;
  const day=m[1].padStart(2,'0');
  let yr;
  if(m[3])yr=m[3].length===2?2000+parseInt(m[3]):parseInt(m[3]);
  else{const now=new Date();yr=now.getFullYear();const parsed=new Date(yr+'-'+mon+'-'+day);if(parsed-now>60*86400000)yr--;}
  return yr+'-'+mon+'-'+day;
}
function isDateHdr(h){return normDateHdr(h.toLowerCase())!==null;}

function procFile(file){

      st.innerHTML='<div class="al_ alw" style="font-size:.84rem">'
        +'<div style="font-weight:700;margin-bottom:6px">Excel file detected</div>'

        +'<div style="font-size:.78rem;color:var(--muted)">To test: export your Excel sheet as CSV and re-upload, or use the live backend.</div>'

    }

      +(extras.length?'<div class="kv" style="border:none;padding:3px 0"><span class="k">Optional fields</span><span class="v">'+extras.join(', ')+' detected ✓</span></div>':'')
      +'<div class="kv" style="border:none;padding:3px 0"><span class="k">Outlier rule</span><span class="v">Sessions &lt;50% of avg attendance flagged, excluded from trends</span></div>'
      +'<div class="kv" style="border:none;padding:3px 0"><span class="k">Sample row</span><span class="v">'+(sample.first_name||'?')+' '+(sample.last_name||'?')+', Yr '+(sample.grade||'?')+'</span></div>'

function splitCSVLine(line){
  // RFC-4180 tokeniser: handles quoted fields containing commas and escaped quotes
  const vals=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQ){if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(c==='"'){inQ=false;}else{cur+=c;}}
    else if(c==='"'){inQ=true;}
    else if(c===','){vals.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  vals.push(cur.trim());
  return vals;
}
function parseCSV(csv){
  const lines=csv.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const headers=splitCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map(line=>{
    const vals=splitCSVLine(line).map(v=>v.replace(/^"|"$/g,''));
    const obj={};
    headers.forEach((h,i)=>{
      const v=vals[i]||'';
      const isoDate=normDateHdr(h);
      if(isoDate)obj[isoDate]=['true','1','yes','y'].includes(v.toLowerCase()); // normalise to ISO key
      else if(h==='grade')obj[h]=v?parseInt(v,10):null;
      else obj[h]=v;
    });
    return(obj.first_name||obj['first name'])?obj:null;
  }).filter(Boolean);
}
function simImport(fn,rowCount,type,dateColCount){
  // Simulate the incremental upsert the real backend performs.
  // dateColCount = number of session date columns found in the CSV.
  const dcc=dateColCount||3;
  let updated=0;
  const sc=students;
  for(let i=0;i<Math.min(rowCount,sc.length);i++){
    const s=sc[i];
    const newAtt=Math.round((s.sA/(s.sT||1))*dcc*(0.8+Math.random()*0.4)); // ~proportional
    if(type==='group'){s.gA=Math.min(s.gT+dcc,s.gA+newAtt);s.gT+=dcc;}
    else{s.sA=Math.min(s.sT+dcc,s.sA+newAtt);s.sT+=dcc;}
    s.ar=cs(s.sA,s.sT,s.gA,s.gT);
    updated++;
  }
  importHistory.unshift({fn,rows:rowCount,added:updated,type,at:new Date().toISOString()});persist();
  document.getElementById('imps').innerHTML='<div class="al_ alo">'+IC.check.replace('<svg ','<svg style="width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:2.5;vertical-align:middle;margin-right:4px" ')+' Import complete — '+updated+' students updated, '+dcc+' new sessions added. Sessions below 50% of average will be flagged as outliers in Trends.</div>';
  setTimeout(()=>renderImport(),2000);
}

// ── PHONE / DESKTOP TOGGLE ──
(function initPhoneToggle(){
  // On first load, #app lives directly in body (desktop mode).
  // In phone mode we move #app into the phone-shell screen div.
  // The phone-preview frame is a LAPTOP demo aid only. On a real phone (narrow
  // viewport) we always show the native full-screen app, hide the toggle, and
  // never honour a saved 'phone' preference — otherwise the user is trapped in a
  // phone-inside-a-phone that double-scrolls.
  const phoneQ = window.matchMedia('(max-width: 767.98px)');
  let phoneMode = !phoneQ.matches && localStorage.getItem('ya_view') === 'phone';

  function applyView(phone){
    const app = document.getElementById('app');
    const shell = document.getElementById('phone-shell');
    const placeholder = document.getElementById('app-desktop-placeholder');
    const icon = document.getElementById('vt-icon');
    const label = document.getElementById('vt-label');
    if(phone){
      // Move #app inside the phone screen (it's already there if shell contains it)
      const screen = shell.querySelector('.phone-screen');
      // Insert app between island and home bar
      const island = shell.querySelector('.phone-island');
      if(app.parentElement !== screen){
        screen.insertBefore(app, island.nextSibling);
      }
      shell.style.display = 'block';
      placeholder.style.display = 'none';
      document.body.classList.add('phone-mode');
      icon.innerHTML = '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>';
      label.textContent = 'Desktop View';
    } else {
      // Move #app back to body-level placeholder position
      if(app.parentElement !== document.body){
        document.body.insertBefore(app, placeholder);
      }
      shell.style.display = 'none';
      placeholder.style.display = 'block';
      document.body.classList.remove('phone-mode');
      icon.innerHTML = '<rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>';
      label.textContent = 'Phone View';
    }
  }

  window.toggleView = function(){
    if(phoneQ.matches) return; // no phone-preview frame on real phones
    phoneMode = !phoneMode;
    localStorage.setItem('ya_view', phoneMode ? 'phone' : 'desktop');
    applyView(phoneMode);
    // Scroll phone screen to top after toggle
    if(phoneMode){
      const app = document.getElementById('app');
      if(app) app.scrollTop = 0;
    }
  };

  const toggleBtn = document.getElementById('view-toggle');
  function syncToggle(){ if(toggleBtn) toggleBtn.style.display = phoneQ.matches ? 'none' : 'flex'; }

  // Keep things sane across rotation / window resize / responsive dev tools:
  // if we drop to phone width while framed, unframe back to the native app.
  function onViewportChange(){
    if(phoneQ.matches && phoneMode){ phoneMode = false; applyView(false); }
    syncToggle();
  }
  if(phoneQ.addEventListener) phoneQ.addEventListener('change', onViewportChange);
  else if(phoneQ.addListener) phoneQ.addListener(onViewportChange);

  // On a real phone, drop any stale 'phone' pref so it can never re-trap the user.
  if(phoneQ.matches) localStorage.removeItem('ya_view');

  // Apply the resolved view on load. Calling applyView(false) is REQUIRED for the
  // native case: #app starts inside the (display:none) phone-shell in the markup, and
  // applyView(false) is what relocates it out to <body>. Without this the native app
  // renders into a hidden container and shows a white screen.
  syncToggle();
  applyView(phoneMode);
})();

try{boot();}catch(e){document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fee2e2;color:#991b1b;padding:24px;font-family:system-ui;text-align:center"><div><div style="font-size:36px">⚠️</div><h2>Failed to load</h2><p style="margin-top:8px">'+String(e)+'</p><button style="margin-top:20px;padding:10px 20px;background:#ef4444;color:#fff;border:none;border-radius:8px;cursor:pointer" onclick="localStorage.clear();location.reload()">Clear &amp; retry</button></div></div>';}
</script>
</body>
</html>
